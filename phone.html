<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0d0f12" />
    <title>AudioManager — Phone Mic</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0d0f12;
        color: #e8eaed;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        text-align: center;
        max-width: 420px;
      }
      .card h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
      .state { font-size: 15px; color: #b6bcc4; }
      .detail { font-size: 13px; color: #7c828b; line-height: 1.5; }
      .detail.err { color: #f87171; }
      .btn {
        appearance: none; border: 0; border-radius: 10px;
        padding: 14px 22px; font-size: 16px; font-weight: 600;
        background: #2563eb; color: #fff; cursor: pointer;
        touch-action: manipulation; min-width: 200px;
      }
      .btn:active { opacity: 0.85; }
      .btn.ghost { background: #1b1e24; color: #b6bcc4; font-weight: 500; }
      .btn.danger { background: #b91c1c; color: #fff; }
      .meter {
        width: 220px; height: 12px; border-radius: 6px;
        background: #1b1e24; overflow: hidden;
      }
      .meter.muted { opacity: 0.4; }
      .meterFill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #22c55e, #84cc16 70%, #f59e0b);
        transition: width 80ms linear;
      }
      .controls {
        display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 16px;
        max-width: 280px;
      }
      .chk {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 13px; color: #b6bcc4; cursor: pointer;
      }
      .chk input { width: 16px; height: 16px; accent-color: #2563eb; }
      .sel {
        appearance: none; width: 220px; max-width: 100%;
        padding: 10px 12px; border-radius: 10px;
        background: #1b1e24; color: #e8eaed; border: 1px solid #2a2e36;
        font-size: 14px; touch-action: manipulation;
      }
      .dot { width: 14px; height: 14px; border-radius: 50%; }
      .dot.idle { background: #7c828b; animation: pulse 1.4s ease-in-out infinite; }
      .dot.warn { background: #f59e0b; animation: pulse 1.4s ease-in-out infinite; }
      .dot.ok   { background: #22c55e; }
      .dot.err  { background: #ef4444; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="card">
        <div class="dot idle"></div>
        <h1>AudioManager</h1>
        <p class="state">Loading…</p>
      </div>
    </div>
    <script type="module" src="/src/phone/main-phone.ts"></script>
  </body>
</html>
