<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bgf" x1="0" y1="0" x2="1200" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1116"/>
      <stop offset="1" stop-color="#141821"/>
    </linearGradient>
    <style>
      .card  { fill:#1C212C; stroke:#FFFFFF; stroke-opacity:0.08; }
      .lbl   { fill:#E6E9EF; font-size:14px; font-weight:600; }
      .sub   { fill:#6B7280; font-size:11px; font-weight:500; }
      .hdr   { fill:#6B7280; font-size:12px; font-weight:700; letter-spacing:2px; }
      .colh  { fill:#6B7280; font-size:11px; font-weight:700; }
      .wire  { stroke-width:3; fill:none; opacity:0.9; }
      .seg   { fill:#2A3140; }
    </style>
  </defs>

  <rect width="1200" height="500" fill="url(#bgf)"/>

  <!-- ── column headers ─────────────────────────────────────────── -->
  <text x="36"  y="44" class="hdr">SOURCES</text>
  <text x="264" y="44" class="hdr">ROUTING &#183; SEND PER BUS</text>
  <text x="976" y="44" class="hdr">OUTPUTS</text>

  <!-- ── SOURCES legend (color/letter key, intentionally not row-aligned) ── -->
  <g transform="translate(36,72)">
    <rect class="card" width="196" height="322" rx="14"/>
    <text x="18" y="30" class="colh">INPUT KEY</text>
    <line x1="16" y1="44" x2="180" y2="44" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g>
      <!-- M Microphone -->
      <circle cx="34" cy="86" r="13" fill="#EF4444"/>
      <text x="34" y="91" font-size="12" font-weight="700" fill="#0E1116" text-anchor="middle">M</text>
      <text x="58" y="82" class="lbl">Microphone</text>
      <text x="58" y="99" class="sub">capture device</text>
      <!-- S System -->
      <circle cx="34" cy="150" r="13" fill="#3B82F6"/>
      <text x="34" y="155" font-size="12" font-weight="700" fill="#0E1116" text-anchor="middle">S</text>
      <text x="58" y="146" class="lbl">System Audio</text>
      <text x="58" y="163" class="sub">process loopback</text>
      <!-- P Phone -->
      <circle cx="34" cy="214" r="13" fill="#22C55E"/>
      <text x="34" y="219" font-size="12" font-weight="700" fill="#0E1116" text-anchor="middle">P</text>
      <text x="58" y="210" class="lbl">Phone</text>
      <text x="58" y="227" class="sub">wireless, paired</text>
      <!-- A App -->
      <circle cx="34" cy="278" r="13" fill="#A855F7"/>
      <text x="34" y="283" font-size="12" font-weight="700" fill="#0E1116" text-anchor="middle">A</text>
      <text x="58" y="274" class="lbl">App / Media</text>
      <text x="58" y="291" class="sub">per-app capture</text>
    </g>
  </g>

  <!-- ── send-column + level mini headers ───────────────────────── -->
  <g>
    <text x="288" y="72" class="colh">BUS</text>
    <g class="colh" text-anchor="middle">
      <text x="482" y="72">M</text>
      <text x="522" y="72">S</text>
      <text x="562" y="72">P</text>
      <text x="602" y="72">A</text>
    </g>
    <text x="646" y="72" class="colh">LEVEL</text>
  </g>

  <!-- ════════════════════════ BUS LANES ════════════════════════ -->
  <!-- helper geometry per lane: card x=264 w=592 h=64; sends cx 482/522/562/602; meter segs from 646 -->

  <!-- ── A1 Monitor (yellow) · sends M,P · meter 4/7 ───────────── -->
  <g transform="translate(0,84)">
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#1C212C" stroke="#FBBF24" stroke-opacity="0.45"/>
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#FBBF24" opacity="0.05"/>
    <circle cx="288" cy="32" r="7" fill="#FBBF24"/>
    <text x="304" y="28" class="lbl">A1 Monitor</text>
    <text x="304" y="46" class="sub">gain &#183; mute</text>
    <line x1="452" y1="14" x2="452" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="482" cy="32" r="11" fill="#FBBF24"/>
    <circle cx="522" cy="32" r="10.5" fill="none" stroke="#3a414e" stroke-width="2"/>
    <circle cx="562" cy="32" r="11" fill="#FBBF24"/>
    <circle cx="602" cy="32" r="10.5" fill="none" stroke="#3a414e" stroke-width="2"/>
    <line x1="628" y1="14" x2="628" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g>
      <rect class="seg" x="646" y="25" width="20" height="14" rx="2"/><rect x="646" y="25" width="20" height="14" rx="2" fill="#FBBF24"/>
      <rect class="seg" x="671" y="25" width="20" height="14" rx="2"/><rect x="671" y="25" width="20" height="14" rx="2" fill="#FBBF24"/>
      <rect class="seg" x="696" y="25" width="20" height="14" rx="2"/><rect x="696" y="25" width="20" height="14" rx="2" fill="#FBBF24"/>
      <rect class="seg" x="721" y="25" width="20" height="14" rx="2"/><rect x="721" y="25" width="20" height="14" rx="2" fill="#FBBF24"/>
      <rect class="seg" x="746" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="771" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="796" y="25" width="20" height="14" rx="2"/>
    </g>
    <path class="wire" stroke="#FBBF24" d="M856 32 H976"/>
  </g>

  <!-- ── A2 Speakers (amber) · sends S,A · meter 3/7 ───────────── -->
  <g transform="translate(0,166)">
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#1C212C" stroke="#F59E0B" stroke-opacity="0.45"/>
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#F59E0B" opacity="0.05"/>
    <circle cx="288" cy="32" r="7" fill="#F59E0B"/>
    <text x="304" y="28" class="lbl">A2 Speakers</text>
    <text x="304" y="46" class="sub">gain &#183; mute</text>
    <line x1="452" y1="14" x2="452" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="482" cy="32" r="10.5" fill="none" stroke="#3a414e" stroke-width="2"/>
    <circle cx="522" cy="32" r="11" fill="#F59E0B"/>
    <circle cx="562" cy="32" r="10.5" fill="none" stroke="#3a414e" stroke-width="2"/>
    <circle cx="602" cy="32" r="11" fill="#F59E0B"/>
    <line x1="628" y1="14" x2="628" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g>
      <rect class="seg" x="646" y="25" width="20" height="14" rx="2"/><rect x="646" y="25" width="20" height="14" rx="2" fill="#F59E0B"/>
      <rect class="seg" x="671" y="25" width="20" height="14" rx="2"/><rect x="671" y="25" width="20" height="14" rx="2" fill="#F59E0B"/>
      <rect class="seg" x="696" y="25" width="20" height="14" rx="2"/><rect x="696" y="25" width="20" height="14" rx="2" fill="#F59E0B"/>
      <rect class="seg" x="721" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="746" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="771" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="796" y="25" width="20" height="14" rx="2"/>
    </g>
    <path class="wire" stroke="#F59E0B" d="M856 32 H976"/>
  </g>

  <!-- ── B1 Stream (purple) · sends all · meter 6/7 ────────────── -->
  <g transform="translate(0,248)">
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#1C212C" stroke="#A855F7" stroke-opacity="0.5"/>
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#A855F7" opacity="0.06"/>
    <circle cx="288" cy="32" r="7" fill="#A855F7"/>
    <text x="304" y="28" class="lbl">B1 Stream</text>
    <text x="304" y="46" class="sub">gain &#183; mute</text>
    <line x1="452" y1="14" x2="452" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="482" cy="32" r="11" fill="#A855F7"/>
    <circle cx="522" cy="32" r="11" fill="#A855F7"/>
    <circle cx="562" cy="32" r="11" fill="#A855F7"/>
    <circle cx="602" cy="32" r="11" fill="#A855F7"/>
    <line x1="628" y1="14" x2="628" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g>
      <rect class="seg" x="646" y="25" width="20" height="14" rx="2"/><rect x="646" y="25" width="20" height="14" rx="2" fill="#A855F7"/>
      <rect class="seg" x="671" y="25" width="20" height="14" rx="2"/><rect x="671" y="25" width="20" height="14" rx="2" fill="#A855F7"/>
      <rect class="seg" x="696" y="25" width="20" height="14" rx="2"/><rect x="696" y="25" width="20" height="14" rx="2" fill="#A855F7"/>
      <rect class="seg" x="721" y="25" width="20" height="14" rx="2"/><rect x="721" y="25" width="20" height="14" rx="2" fill="#A855F7"/>
      <rect class="seg" x="746" y="25" width="20" height="14" rx="2"/><rect x="746" y="25" width="20" height="14" rx="2" fill="#A855F7"/>
      <rect class="seg" x="771" y="25" width="20" height="14" rx="2"/><rect x="771" y="25" width="20" height="14" rx="2" fill="#A855F7"/>
      <rect class="seg" x="796" y="25" width="20" height="14" rx="2"/>
    </g>
    <path class="wire" stroke="#A855F7" d="M856 32 H976"/>
  </g>

  <!-- ── B2 Record (red) · sends M,A · meter 3/7 ───────────────── -->
  <g transform="translate(0,330)">
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#1C212C" stroke="#EF4444" stroke-opacity="0.5"/>
    <rect x="264" y="0" width="592" height="64" rx="12" fill="#EF4444" opacity="0.05"/>
    <circle cx="288" cy="32" r="7" fill="#EF4444"/>
    <text x="304" y="28" class="lbl">B2 Record</text>
    <text x="304" y="46" class="sub">gain &#183; mute</text>
    <line x1="452" y1="14" x2="452" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="482" cy="32" r="11" fill="#EF4444"/>
    <circle cx="522" cy="32" r="10.5" fill="none" stroke="#3a414e" stroke-width="2"/>
    <circle cx="562" cy="32" r="10.5" fill="none" stroke="#3a414e" stroke-width="2"/>
    <circle cx="602" cy="32" r="11" fill="#EF4444"/>
    <line x1="628" y1="14" x2="628" y2="50" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <g>
      <rect class="seg" x="646" y="25" width="20" height="14" rx="2"/><rect x="646" y="25" width="20" height="14" rx="2" fill="#EF4444"/>
      <rect class="seg" x="671" y="25" width="20" height="14" rx="2"/><rect x="671" y="25" width="20" height="14" rx="2" fill="#EF4444"/>
      <rect class="seg" x="696" y="25" width="20" height="14" rx="2"/><rect x="696" y="25" width="20" height="14" rx="2" fill="#EF4444"/>
      <rect class="seg" x="721" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="746" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="771" y="25" width="20" height="14" rx="2"/>
      <rect class="seg" x="796" y="25" width="20" height="14" rx="2"/>
    </g>
    <path class="wire" stroke="#EF4444" d="M856 32 H976"/>
  </g>

  <!-- ── OUTPUTS (1:1 with buses) ───────────────────────────────── -->
  <g>
    <g transform="translate(976,84)">
      <rect class="card" width="188" height="64" rx="12"/>
      <text x="18" y="28" class="lbl">Headphones</text>
      <text x="18" y="46" class="sub">monitor device</text>
    </g>
    <g transform="translate(976,166)">
      <rect class="card" width="188" height="64" rx="12"/>
      <text x="18" y="28" class="lbl">Speakers</text>
      <text x="18" y="46" class="sub">playback device</text>
    </g>
    <g transform="translate(976,248)">
      <rect class="card" width="188" height="64" rx="12"/>
      <text x="18" y="28" class="lbl">Virtual Cable</text>
      <text x="18" y="46" class="sub">OBS &#183; Discord &#183; Zoom</text>
    </g>
    <g transform="translate(976,330)">
      <rect class="card" width="188" height="64" rx="12"/>
      <text x="18" y="28" class="lbl">Recorder</text>
      <text x="18" y="46" class="sub">WAV file</text>
    </g>
  </g>

  <!-- ── per-bus DSP chain footer ───────────────────────────────── -->
  <g transform="translate(264,418)">
    <rect class="card" width="900" height="58" rx="12" fill="#151922"/>
    <text x="20" y="26" class="hdr" fill="#9AA3B2">PER-BUS DSP</text>
    <g font-size="13" font-weight="600" fill="#E6E9EF">
      <text x="20"  y="46">High-pass</text>
      <text x="135" y="46">Noise Gate</text>
      <text x="262" y="46">Compressor</text>
      <text x="400" y="46">EQ</text>
      <text x="458" y="46">Soft Limiter</text>
      <text x="598" y="46">Ducking</text>
    </g>
    <g fill="#6B7280" font-size="16" font-weight="400">
      <text x="110" y="46">&#8594;</text>
      <text x="240" y="46">&#8594;</text>
      <text x="378" y="46">&#8594;</text>
      <text x="436" y="46">&#8594;</text>
      <text x="576" y="46">&#8594;</text>
    </g>
    <text x="720" y="46" font-size="12" fill="#6B7280">peak &#183; RMS &#183; LUFS metering</text>
  </g>
</svg>
