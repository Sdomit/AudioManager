name: Bug
description: Something behaves incorrectly.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      value: |
        1.
        2.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS build (e.g. Win11 26200), output/input devices, sample rates, app/source captured.
