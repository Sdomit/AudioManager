name: CI

# Validation pipeline for the process-loopback work and the rest of the app.
# The Rust job runs on windows-latest so the `#[cfg(windows)]` WASAPI loopback
# and session-enumeration modules are actually compiled and tested.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm exec tsc --noEmit
      - name: Unit tests
        run: pnpm test
      - name: Build desktop frontend
        run: pnpm build
      - name: Build phone bundle
        run: pnpm build:phone

  rust:
    name: Rust (windows)
    runs-on: windows-latest
    # Build libopus (audiopus -> cmake-rs) on the runner's modern toolchain:
    #  - CMAKE_GENERATOR=Ninja: without it cmake-rs auto-selects the newest VS
    #    generator (e.g. "Visual Studio 18 2026") that the runner's CMake cannot
    #    create. Ninja + cl (from msvc-dev-cmd) matches scripts/win-dev-shell.ps1.
    #  - CMAKE_POLICY_VERSION_MINIMUM=3.5: the runner ships CMake 4.x, which
    #    removed compatibility with libopus's old `cmake_minimum_required(<3.5)`;
    #    this opts back into the legacy policy so configure succeeds.
    env:
      CMAKE_GENERATOR: Ninja
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # audiopus (Phase 2 phone-audio receiver) builds libopus from C via CMake,
      # which needs cl + cmake + ninja on PATH. msvc-dev-cmd sets up cl; cmake and
      # ninja are preinstalled on windows-latest. See scripts/win-dev-shell.ps1
      # for the local equivalent.
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        run: cargo check --all-targets
      - name: Tests
        run: cargo test
      # fmt/clippy are informational until the repo is brought to a single
      # rustfmt/clippy baseline (the tree currently predates the pinned
      # toolchain). Flip continue-on-error off once that lands.
      - name: Format
        run: cargo fmt -- --check
        continue-on-error: true
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
