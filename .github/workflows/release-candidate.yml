name: Release candidate

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-version tag to verify, for example v0.2.0
        required: true
        type: string
      create_draft:
        description: Create an unsigned pre-release draft after the candidate passes (maintainer review required)
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  attestations: write
  artifact-metadata: write
  id-token: write

jobs:
  package:
    name: Build and attest Windows candidate
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
      # audiopus builds libopus via CMake. These match the existing Windows CI
      # compatibility settings for the hosted runner toolchain.
      CMAKE_GENERATOR: Ninja
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.tag }}
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
      - name: Verify release version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $semverPattern = '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'
          if ($env:RELEASE_TAG -notmatch $semverPattern) {
            throw "Release tag must be a valid SemVer 2.0.0 version beginning with v."
          }

          $expected = $env:RELEASE_TAG.Substring(1)
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoMetadata = cargo metadata --manifest-path src-tauri/Cargo.toml --format-version 1 --no-deps | ConvertFrom-Json
          $cargoPackages = @($cargoMetadata.packages | Where-Object { $_.name -eq "audio-manager" })
          if ($cargoPackages.Count -ne 1) {
            throw "Expected exactly one Cargo package named audio-manager, found $($cargoPackages.Count)."
          }
          $cargoVersion = $cargoPackages[0].version

          if (@($packageVersion, $tauriVersion, $cargoVersion) | Where-Object { $_ -ne $expected }) {
            throw "Version mismatch. Tag=$expected package=$packageVersion tauri=$tauriVersion cargo=$cargoVersion"
          }
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate frontend
        run: |
          pnpm exec tsc --noEmit
          pnpm test
          pnpm build
      - name: Validate Rust
        working-directory: src-tauri
        run: |
          cargo test
          cargo fmt -- --check
          cargo clippy --all-targets -- -D warnings
      - name: Build Windows installer
        run: pnpm exec tauri build
      - name: Generate checksums
        shell: pwsh
        run: |
          $assets = Get-ChildItem src-tauri/target/release/bundle -Recurse -File
          if (-not $assets) { throw "Tauri did not produce any bundled release assets." }

          $repositoryRoot = (Get-Location).Path
          $checksumLines = $assets | Sort-Object FullName | Get-FileHash -Algorithm SHA256 | ForEach-Object {
            $relativePath = [System.IO.Path]::GetRelativePath($repositoryRoot, $_.Path).Replace('\', '/')
            "{0}  {1}" -f $_.Hash.ToLowerInvariant(), $relativePath
          }
          $checksumLines | Set-Content -Path checksums-sha256.txt -Encoding utf8
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest build provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: src-tauri/target/release/bundle/**/*
      - name: Attest SBOM
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: src-tauri/target/release/bundle/**/*
          sbom-path: sbom.spdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: AudioManager-${{ env.RELEASE_TAG }}-windows-candidate
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**
            checksums-sha256.txt
            sbom.spdx.json

  draft-release:
    name: Create pre-release draft
    needs: package
    if: github.event_name == 'workflow_dispatch' && inputs.create_draft
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: AudioManager-${{ inputs.tag }}-windows-candidate
          path: release-assets
      - name: Create unsigned draft pre-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem release-assets -Recurse -File | Select-Object -ExpandProperty FullName
          if (-not $assets) { throw "The candidate artifact bundle is empty." }
          gh release view $env:RELEASE_TAG 2>$null
          if ($LASTEXITCODE -eq 0) { throw "A release for $env:RELEASE_TAG already exists." }
          gh release create $env:RELEASE_TAG $assets --draft --prerelease --title "AudioManager $env:RELEASE_TAG" --notes "Draft pre-release only. Review checksums, SBOM, provenance, third-party notices, and clean-machine tests before publication. This candidate is unsigned until the Windows code-signing process is configured."

# Tag pushes produce a verified candidate only. A GitHub Release draft can be
# created only by an explicit manual dispatch with create_draft=true; it is
# always a pre-release and is never published by this workflow. Apache-2.0 is
# confirmed for the source, AudioManager branding remains owner-controlled,
# external code contributions are closed for the current pre-1.0 phase, and
# Windows signing plus the documented review are required before publication.
